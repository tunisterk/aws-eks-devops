# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  ui:
    image: public.ecr.aws/aws-containers/retail-store-sample-ui
    ports:
      - "8888:8080"
    environment:
      - PORT=8080
      - RETAIL_UI_ENDPOINTS_CATALOG=http://catalog:8080
      - RETAIL_UI_ENDPOINTS_CARTS=http://carts:8080
      - RETAIL_UI_ENDPOINTS_ORDERS=http://orders:8080
      - RETAIL_UI_ENDPOINTS_CHECKOUT=http://checkout:8080
    depends_on:
      catalog:
        condition: service_healthy
      carts:
        condition: service_healthy
      orders:
        condition: service_healthy
      checkout:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  catalog:
    image: public.ecr.aws/aws-containers/retail-store-sample-catalog:1.6.1
    environment:
      - PORT=8080
      - RETAIL_CATALOG_PERSISTENCE_PROVIDER=mysql
      - RETAIL_CATALOG_PERSISTENCE_ENDPOINT=catalog-db:3306
      - RETAIL_CATALOG_PERSISTENCE_DB_NAME=catalogdb
      - RETAIL_CATALOG_PERSISTENCE_USER=catalog_user
      - RETAIL_CATALOG_PERSISTENCE_PASSWORD=password123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s    

    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - app-network

  catalog-db:
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=catalogdb
      - MYSQL_USER=catalog_user
      - MYSQL_PASSWORD=password123
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s    
    networks:
      - app-network
    volumes:
      - catalog-db-data:/var/lib/mysql

  carts:
    image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.6.1
    environment:
      - PORT=8080
      - RETAIL_CART_PERSISTENCE_PROVIDER=dynamodb
      - RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT=http://carts-db:8000
      - RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE=true
    depends_on:
      carts-db:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network



  carts-db:
    image: public.ecr.aws/z8o9m4l5/amazon/dynamodb-local:1.13.1
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/shell/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network
  
  orders:
    image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.0.0
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - RETAIL_ORDERS_PERSISTENCE_PROVIDER=postgres
      - RETAIL_ORDERS_PERSISTENCE_ENDPOINT=orders-db:5432
      - RETAIL_ORDERS_PERSISTENCE_NAME=orders
      - RETAIL_ORDERS_PERSISTENCE_USERNAME=orders_user
      - RETAIL_ORDERS_PERSISTENCE_PASSWORD=testing
      - RETAIL_ORDERS_MESSAGING_PROVIDER=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES=rabbitmq:5672
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD=testing
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network  
    
    depends_on:
      orders-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  orders-db:
    image: postgres:16
    environment:
      - POSTGRES_DB=orders
      - POSTGRES_USER=orders_user
      - POSTGRES_PASSWORD=testing
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "orders_user"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s 
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=testing
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s 
    networks:
      - app-network


  checkout:
    image: public.ecr.aws/aws-containers/retail-store-sample-checkout:1.6.1
    environment:
      - PORT=8080
      - RETAIL_CHECKOUT_PERSISTENCE_PROVIDER=redis
      - RETAIL_CHECKOUT_ENDPOINTS_ORDERS=http://orders:8080
      - RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL=redis://checkout-db:6379
    healthcheck:
      test: ["CMD", "node", "/healthcheck.js"]     
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s 
    depends_on:
      checkout-db:
        condition: service_healthy
    networks:
      - app-network
  
  checkout-db:
    image: redis:latest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s 
    networks:
      - app-network
volumes:
  catalog-db-data: 
  orders-db-data:
networks:
  app-network:
      