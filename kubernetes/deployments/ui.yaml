apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: public.ecr.aws/aws-containers/retail-store-sample-ui:1.6.1
        resources:
          requests:
            cpu: "128m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        ports:
        - containerPort: 8080
        env:
          - name: PORT
            value: "8080"
          - name: RETAIL_UI_ENDPOINTS_CATALOG
            value: "http://catalog:8080"
          - name: RETAIL_UI_ENDPOINTS_CARTS
            value: "http://carts:8080"
          - name: RETAIL_UI_ENDPOINTS_ORDERS
            value: "http://orders:8080"
          - name: RETAIL_UI_ENDPOINTS_CHECKOUT
            value: "http://checkout:8080"

