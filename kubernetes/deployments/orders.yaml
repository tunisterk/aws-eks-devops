apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.0.0
        resources:
          requests:
            cpu: "128m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        ports:
        - containerPort: 8080
        env: 
          - name: PORT
            value: "8080"
          - name: RETAIL_CHECKOUT_PERSISTENCE_PROVIDER
            value: "postgres"
          - name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
            value: "orders-db:5432"
          - name: RETAIL_ORDERS_PERSISTENCE_NAME
            value: "orders"
          - name: RETAIL_ORDERS_PERSISTENCE_USERNAME
            value: "orders_user"
          - name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
            value: "testing"
          - name: RETAIL_ORDERS_MESSAGING_PROVIDER
            value: "in-memory"
