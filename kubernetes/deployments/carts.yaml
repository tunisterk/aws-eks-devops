apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carts
  template:
    metadata:
      labels:
        app: carts
    spec:
      containers:
        - name: carts
          image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.6.1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "128m"
              memory: "256Mi"
            limits:
              memory: "521Mi"
              cpu: "500m"
          env:
            - name: PORT
              value: "8080"
            - name: RETAIL_CART_PERSISTENCE_PROVIDER
              value: "dynamodb"
            - name: RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE
              value: "true"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: "eu-central-1"